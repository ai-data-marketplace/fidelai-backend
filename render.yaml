databases:
  - name: fideldb
    plan: free
    databaseName: fideldb
    user: fidelsuperuser

services:
  # -------------------------
  # Django Web Service
  # -------------------------
  - type: web
    name: fidelai-web
    runtime: python
    plan: free

    buildCommand: './build.sh'
    startCommand: 'gunicorn config.wsgi:application'

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11

      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: DATABASE_URL
        fromDatabase:
          name: fideldb
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: REDIS_URL
        fromService:
          name: fidelai-redis
          type: redis
          property: connectionString

      - key: WEB_CONCURRENCY
        value: 4

  # -------------------------
  # Redis (Celery Broker)
  # -------------------------
  - type: redis
    name: fidelai-redis
    plan: free
    ipAllowList: []

  # -------------------------
  # Celery Worker
  # -------------------------
  - type: worker
    name: fidelai-worker
    runtime: python
    plan: free

    buildCommand: './build.sh'
    startCommand: 'celery -A config worker -l info'

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11

      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: DATABASE_URL
        fromDatabase:
          name: fideldb
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: fidelai-redis
          type: redis
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

  # -------------------------
  # Celery Beat (Scheduler)
  # -------------------------
  - type: worker
    name: fidelai-beat
    runtime: python
    plan: free

    buildCommand: './build.sh'
    startCommand: 'celery -A config beat -l info'

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11

      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      - key: DATABASE_URL
        fromDatabase:
          name: fideldb
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: fidelai-redis
          type: redis
          property: connectionString

      - key: SECRET_KEY
        generateValue: true